version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: careercopilot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: careercopilot
      POSTGRES_PASSWORD: careercopilot_secret
      POSTGRES_DB: careercopilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careercopilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - careercopilot

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: careercopilot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - careercopilot

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: careercopilot_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=careercopilot
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - careercopilot

  # Go Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careercopilot_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: careercopilot
      DB_PASSWORD: careercopilot_secret
      DB_NAME: careercopilot
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ES_ADDRESSES: http://elasticsearch:9200
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_this_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_in_production}
      JWT_ACCESS_EXPIRY: 15
      JWT_REFRESH_EXPIRY: 10080
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_NAME: CareerCopilot
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@careercopilot.io}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_DURATION: 60
      SCHEDULER_JOB_INTERVAL_HOURS: 6
      SCHEDULER_DIGEST_CRON: "0 7 * * *"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - careercopilot

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careercopilot_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - careercopilot

volumes:
  postgres_data:
  redis_data:
  es_data:

networks:
  careercopilot:
    driver: bridge
